services:
  postgres:
    image: postgres:16-alpine
    container_name: heimdall-test-postgres
    environment:
      POSTGRES_DB: heimdall_test
      POSTGRES_USER: heimdall
      POSTGRES_PASSWORD: heimdall
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heimdall -d heimdall_test"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: heimdall-test-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 4000
      CORS_ORIGIN: http://localhost:3000,http://localhost:5173
      DATABASE_URL: postgres://heimdall:heimdall@postgres:5432/heimdall_test
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
    container_name: heimdall-test-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres-data:
