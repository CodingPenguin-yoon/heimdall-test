services:
  backend:
    build:
      context: ./backend
    container_name: heimdall-test-backend
    environment:
      PORT: 4000
      CORS_ORIGIN: http://localhost:3000,http://localhost:5173
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
    container_name: heimdall-test-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

